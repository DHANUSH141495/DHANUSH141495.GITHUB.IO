
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Launcher</title>
    <link rel="stylesheet" href="file.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon-wrapper">
                <svg class="excel-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8 13L11 16L8 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 13L13 16L16 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Spreadsheet Portal</h1>
            <p>Click below to open your Excel workbook and start managing your data.</p>
            
            <button id="excelBtn" class="excel-button">
                <span class="button-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 4L20 4L20 20L4 20L4 4Z" stroke="currentColor" stroke-width="2"/>
                        <path d="M4 8H20" stroke="currentColor" stroke-width="2"/>
                        <path d="M4 12H20" stroke="currentColor" stroke-width="2"/>
                        <path d="M4 16H20" stroke="currentColor" stroke-width="2"/>
                        <path d="M8 4V20" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 4V20" stroke="currentColor" stroke-width="2"/>
                        <path d="M16 4V20" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </span>
                <span class="button-text">Open Excel Sheet</span>
            </button>
            
            <div class="alternatives">
                <p>Or open directly:</p>
                <div class="link-group">
                    <a href="https://www.office.com/launch/excel" target="_blank" rel="noopener noreferrer" class="alt-link">Excel Online</a>
                    <a href="./your-spreadsheet.xlsx" download class="alt-link">Download File</a>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast">
        <span class="toast-message"></span>
    </div>

    <script src="file.js"></script>
    <script>
        // Attach click handler to open Excel Online in a new tab and show a toast
        (function () {
            const excelBtn = document.getElementById('excelBtn');
            const toast = document.getElementById('toast');
            const msgEl = toast ? toast.querySelector('.toast-message') : null;

            function showToast(message, duration = 3000) {
                if (!toast || !msgEl) return;
                msgEl.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), duration);
            }

            if (excelBtn) {
                excelBtn.addEventListener('click', function () {
                    // Open Excel Online
                    window.open('https://www.office.com/launch/excel', '_blank', 'noopener,noreferrer');
                    showToast('Opening Excel Online...');
                });
            }
        })();
    </script>
</body>
</html>
